name: Frontend Dependency Governance

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/.npmrc"
      - "frontend/dependency-policy.json"
      - "frontend/dependency-patches.json"
      - "frontend/patches/**"
      - "frontend/scripts/**"
      - "docker/frontend.Dockerfile"
      - ".github/workflows/frontend-ci.yml"
      - ".github/workflows/frontend-dependency-review.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/.npmrc"
      - "frontend/dependency-policy.json"
      - "frontend/dependency-patches.json"
      - "frontend/patches/**"
      - "frontend/scripts/**"
      - "docker/frontend.Dockerfile"
      - ".github/workflows/frontend-ci.yml"
      - ".github/workflows/frontend-dependency-review.yml"

jobs:
  dependency-review:
    name: GitHub dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  dependency-policy-and-audit:
    name: Policy + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Validate dependency policy
        run: npm run check:dependency-policy

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply trusted dependency patches
        run: npm run apply:dependency-patches

      - name: Generate dependency inventory
        run: npm run deps:inventory > dependency-inventory.json

      - name: Run npm audit
        run: npm audit --audit-level=high --json > dependency-audit.json

      - name: Upload dependency governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dependency-governance
          path: |
            frontend/dependency-inventory.json
            frontend/dependency-audit.json
          if-no-files-found: ignore
