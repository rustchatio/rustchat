name: Docs CI/CD

on:
  pull_request:
    branches: ["main"]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs-ci-cd.yml"
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs-ci-cd.yml"

jobs:
  docs-build:
    name: Docs link check + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate internal markdown links
        run: npm run docs:check-links

      - name: Build docs site
        run: npm run docs:build

      - name: Upload docs build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site-dist
          path: docs/.vitepress/dist
          if-no-files-found: error

  deploy-to-cloudflare-pages:
    name: Deploy docs to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: docs-build
    if: github.event_name == 'push' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_PAGES_PROJECT_NAME != ''

    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site-dist
          path: site-dist

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site-dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=main
