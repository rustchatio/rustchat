name: Frontend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    name: Hardened install + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Validate dependency policy
        run: npm run check:dependency-policy

      - name: Install dependencies
        run: |
          set -euo pipefail
          echo "::group::npm ci --ignore-scripts"
          npm ci --ignore-scripts
          echo "::endgroup::"

      - name: Apply trusted dependency patches
        run: npm run apply:dependency-patches

      - name: Generate dependency inventory
        run: npm run deps:inventory > dependency-inventory.json

      - name: Run unit tests
        run: |
          set -euo pipefail
          echo "::group::npm run test:unit"
          npm run test:unit
          echo "::endgroup::"

      - name: Build frontend
        run: |
          set -euo pipefail
          echo "::group::npm run build"
          npm run build
          echo "::endgroup::"

      - name: Upload dependency inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dependency-inventory
          path: frontend/dependency-inventory.json
          if-no-files-found: ignore

  settings-visual-parity:
    name: Settings visual parity (Playwright)
    runs-on: macos-latest
    needs: build
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Apply trusted dependency patches
        run: npm run apply:dependency-patches

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run settings parity snapshot gate
        run: npm run test:e2e:settings-parity

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: settings-parity-playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: settings-parity-test-results
          path: frontend/test-results/
          if-no-files-found: ignore
