# cargo-deny configuration for RustChat
# See: https://embarkstudios.github.io/cargo-deny/

# Targets to check
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]

# Advisory Database
[advisories]
# Use the OSV-based advisory database
version = 2
# Fail on high/critical vulnerabilities (CI will handle this separately via cargo-audit)
# This allows warnings in development but blocks in CI
yanked = "deny"

[licenses]
# List of explicitly allowed licenses
# Must be OSI-approved: https://opensource.org/licenses/alphabetical
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-DFS-2016",
    "OpenSSL",
    "CC0-1.0",
]

# Explicitly deny copyleft licenses that could contaminate the project
deny = [
    "GPL-1.0",
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-1.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
    "EPL-1.0",
    "EPL-2.0",
    "CDDL-1.0",
    "CDDL-1.1",
]

# Allow common non-standard license expressions
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki-roots"
expression = "MPL-2.0"
license-files = [{ path = "LICENSE", hash = 0x6c0f17a1 }]

# Some crates don't have clear license metadata
[[licenses.clarify]]
name = "rustls-webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x6c0f17a1 }]

[bans]
# Multiple versions of the same crate can cause issues
multiple-versions = "warn"
# Wildcard dependencies are not allowed in production
wildcards = "deny"
highlight = "all"

# Certain crates we want to skip the multiple-version check for
# (commonly used transitive dependencies)
skip = [
    # These often have multiple versions due to ecosystem fragmentation
    { name = "windows-sys" },
    { name = "windows-targets" },
    { name = "windows_aarch64_*" },
    { name = "windows_i686_*" },
    { name = "windows_x86_64_*" },
    { name = "hashbrown" },
    { name = "indexmap" },
]

# Deny specific crates with known issues or better alternatives
deny = [
    # Use rustls instead of native-tls for better security
    { name = "openssl-sys", wrappers = ["lettre"] },
    # We prefer rustls-based TLS
    { name = "native-tls" },
]

[sources]
# Only allow crates from known registries
unknown-registry = "deny"
unknown-git = "deny"

[sources.allow-org]
# Allow GitHub orgs if needed for private deps
github = []
