# Kubernetes Secret Template for RustChat
#
# IMPORTANT: This is a template. Do NOT commit real secrets to git.
# Use a secrets management system like:
# - Sealed Secrets (bitnami-labs/sealed-secrets)
# - External Secrets Operator
# - Vault Agent Injector
# - AWS Secrets Manager / GCP Secret Manager / Azure Key Vault
#
# To create secrets manually (development only):
# kubectl create secret generic rustchat-security \
#   --from-literal=jwt-secret=<your-jwt-secret> \
#   --from-literal=encryption-key=<your-encryption-key> \
#   -n rustchat

apiVersion: v1
kind: Secret
metadata:
  name: rustchat-security
  namespace: rustchat
  labels:
    app: rustchat-backend
type: Opaque
stringData:
  # JWT secret - must be at least 32 characters, high entropy
  # Generate: openssl rand -base64 48
  jwt-secret: "CHANGE_ME_JWT_SECRET_MIN_32_CHARS"
  
  # Encryption key - 32 bytes for AES-256
  # Generate: openssl rand -base64 32
  encryption-key: "CHANGE_ME_ENCRYPTION_KEY_32BYTES"
---
apiVersion: v1
kind: Secret
metadata:
  name: rustchat-db-credentials
  namespace: rustchat
  labels:
    app: rustchat-backend
type: Opaque
stringData:
  # PostgreSQL connection URL
  # Format: postgres://user:password@host:port/database
  url: "postgres://rustchat:CHANGE_ME@postgres.rustchat.svc.cluster.local:5432/rustchat"
  
  # Read replica URL (optional)
  read-replica-url: "postgres://rustchat:CHANGE_ME@postgres-replica.rustchat.svc.cluster.local:5432/rustchat"
---
apiVersion: v1
kind: Secret
metadata:
  name: rustchat-redis-credentials
  namespace: rustchat
  labels:
    app: rustchat-backend
type: Opaque
stringData:
  # Redis connection URL
  # Format: redis://[:password@]host[:port][/db]
  url: "redis://:CHANGE_ME@redis.rustchat.svc.cluster.local:6379/0"
  
  # Redis cluster nodes (comma-separated)
  cluster-nodes: "redis-0.rustchat.svc.cluster.local:6379,redis-1.rustchat.svc.cluster.local:6379,redis-2.rustchat.svc.cluster.local:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: rustchat-s3-credentials
  namespace: rustchat
  labels:
    app: rustchat-backend
type: Opaque
stringData:
  access-key: "CHANGE_ME_S3_ACCESS_KEY"
  secret-key: "CHANGE_ME_S3_SECRET_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: rustchat-kafka-credentials
  namespace: rustchat
  labels:
    app: rustchat-backend
type: Opaque
stringData:
  # SASL username (if using SASL authentication)
  username: ""
  
  # SASL password (if using SASL authentication)
  password: ""
  
  # SSL certificate (if using TLS)
  ssl-ca.crt: ""
  ssl-certificate.crt: ""
  ssl-key.pem: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: rustchat-opensearch-credentials
  namespace: rustchat
  labels:
    app: rustchat-backend
type: Opaque
stringData:
  # Basic auth credentials
  username: ""
  password: ""
  
  # AWS credentials (if using AWS OpenSearch with SigV4)
  aws-access-key: ""
  aws-secret-key: ""
---
