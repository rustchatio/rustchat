apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rustchat-backend
  namespace: rustchat
  labels:
    app: rustchat-backend
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: rustchat-backend
---
