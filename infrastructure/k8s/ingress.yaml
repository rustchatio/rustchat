apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rustchat-backend
  namespace: rustchat
  labels:
    app: rustchat-backend
  annotations:
    # NGINX Ingress Controller
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    # Enable WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: |
      Upgrade $http_upgrade
      Connection "upgrade"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    # Cert-Manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # AWS ALB (alternative to NGINX)
    # alb.ingress.kubernetes.io/scheme: internet-facing
    # alb.ingress.kubernetes.io/target-type: ip
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.rustchat.io
        - ws.rustchat.io
      secretName: rustchat-tls
  rules:
    - host: api.rustchat.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rustchat-backend
                port:
                  number: 80
    - host: ws.rustchat.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rustchat-backend
                port:
                  number: 80
---
# Network Policy for additional security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rustchat-backend
  namespace: rustchat
  labels:
    app: rustchat-backend
spec:
  podSelector:
    matchLabels:
      app: rustchat-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    # Allow inter-pod communication
    - from:
        - podSelector:
            matchLabels:
              app: rustchat-backend
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
    # Allow PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow Kafka
    - to:
        - podSelector:
            matchLabels:
              app: kafka
      ports:
        - protocol: TCP
          port: 9092
    # Allow OpenSearch
    - to:
        - podSelector:
            matchLabels:
              app: opensearch
      ports:
        - protocol: TCP
          port: 9200
    # Allow S3/RustFS
    - to:
        - podSelector:
            matchLabels:
              app: rustfs
      ports:
        - protocol: TCP
          port: 9000
    # Allow external HTTPS
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
