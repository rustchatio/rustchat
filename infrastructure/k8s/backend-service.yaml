apiVersion: v1
kind: Service
metadata:
  name: rustchat-backend
  namespace: rustchat
  labels:
    app: rustchat-backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
    - name: webrtc-tcp
      port: 8443
      targetPort: 8443
      protocol: TCP
  selector:
    app: rustchat-backend
---
# Headless service for WebRTC/UDP discovery
apiVersion: v1
kind: Service
metadata:
  name: rustchat-backend-headless
  namespace: rustchat
  labels:
    app: rustchat-backend
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
    - name: webrtc-udp
      port: 8443
      targetPort: 8443
      protocol: UDP
  selector:
    app: rustchat-backend
---
# LoadBalancer service for external access (optional)
apiVersion: v1
kind: Service
metadata:
  name: rustchat-backend-lb
  namespace: rustchat
  labels:
    app: rustchat-backend
  annotations:
    # AWS NLB example
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    # GCP example
    # cloud.google.com/l4-rbs: "true"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
    - name: https
      port: 443
      targetPort: 3000
      protocol: TCP
  selector:
    app: rustchat-backend
