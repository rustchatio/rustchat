apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustchat-backend
  namespace: rustchat
  labels:
    app: rustchat-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rustchat-backend
  template:
    metadata:
      labels:
        app: rustchat-backend
    spec:
      containers:
        - name: backend
          image: rustchat-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 8443
              name: webrtc-tcp
              protocol: TCP
            - containerPort: 8443
              name: webrtc-udp
              protocol: UDP
          envFrom:
            - configMapRef:
                name: rustchat-config
            - secretRef:
                name: rustchat-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - rustchat-backend
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: rustchat-backend
  namespace: rustchat
  labels:
    app: rustchat-backend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
    - port: 8443
      targetPort: 8443
      name: webrtc-tcp
      protocol: TCP
    - port: 8443
      targetPort: 8443
      name: webrtc-udp
      protocol: UDP
  selector:
    app: rustchat-backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rustchat-backend-hpa
  namespace: rustchat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rustchat-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
