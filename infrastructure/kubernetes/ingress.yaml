apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rustchat-ingress
  namespace: rustchat
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: "upgrade,connection"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://chat.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type"
    # Cert manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - chat.example.com
      secretName: rustchat-tls
  rules:
    - host: chat.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rustchat-backend
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: rustchat-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rustchat-frontend
                port:
                  number: 80
---
# Separate ingress for WebRTC if needed
apiVersion: v1
kind: Service
metadata:
  name: rustchat-webrtc
  namespace: rustchat
  annotations:
    # Use LoadBalancer for WebRTC if behind NAT
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  ports:
    - port: 8443
      targetPort: 8443
      name: webrtc-tcp
      protocol: TCP
    - port: 8443
      targetPort: 8443
      name: webrtc-udp
      protocol: UDP
  selector:
    app: rustchat-backend
