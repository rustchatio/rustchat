apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustchat-frontend
  namespace: rustchat
  labels:
    app: rustchat-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: rustchat-frontend
  template:
    metadata:
      labels:
        app: rustchat-frontend
    spec:
      containers:
        - name: frontend
          image: rustchat-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rustchat-frontend
  namespace: rustchat
  labels:
    app: rustchat-frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: rustchat-frontend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rustchat-frontend-hpa
  namespace: rustchat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rustchat-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
