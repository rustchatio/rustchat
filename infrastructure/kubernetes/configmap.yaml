apiVersion: v1
kind: ConfigMap
metadata:
  name: rustchat-config
  namespace: rustchat
data:
  RUSTCHAT_SERVER_HOST: "0.0.0.0"
  RUSTCHAT_SERVER_PORT: "3000"
  RUSTCHAT_ENVIRONMENT: "production"
  RUSTCHAT_SITE_URL: "https://chat.example.com"
  RUSTCHAT_CORS_ALLOWED_ORIGINS: "https://chat.example.com"
  RUSTCHAT_S3_PUBLIC_ENDPOINT: "https://s3.rustchat.io"
  RUSTCHAT_S3_BUCKET: "rustchat-uploads"
  RUSTCHAT_CALLS_ENABLED: "true"
  RUSTCHAT_CALLS_UDP_PORT: "8443"
  RUSTCHAT_CALLS_TCP_PORT: "8443"
  RUSTCHAT_CALLS_STATE_BACKEND: "redis"
  RUSTCHAT_SECURITY_WS_ALLOW_QUERY_TOKEN: "false"
  RUSTCHAT_SECURITY_OAUTH_TOKEN_DELIVERY: "cookie"
  RUSTCHAT_SECURITY_RATE_LIMIT_ENABLED: "true"
  RUSTCHAT_SECURITY_RATE_LIMIT_AUTH_PER_MINUTE: "10"
  RUSTCHAT_SECURITY_RATE_LIMIT_WS_PER_MINUTE: "30"
