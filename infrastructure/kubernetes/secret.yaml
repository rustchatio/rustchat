apiVersion: v1
kind: Secret
metadata:
  name: rustchat-secrets
  namespace: rustchat
type: Opaque
stringData:
  # JWT Configuration - CHANGE THESE IN PRODUCTION
  RUSTCHAT_JWT_SECRET: "change-me-in-production-32-chars-min"
  RUSTCHAT_JWT_ISSUER: "rustchat"
  RUSTCHAT_JWT_AUDIENCE: "rustchat-users"
  
  # Encryption Key - 32 bytes, base64 encoded
  RUSTCHAT_ENCRYPTION_KEY: "change-me-in-production-32-bytes!"
  
  # Database
  RUSTCHAT_DATABASE_URL: "postgres://rustchat:change-me@postgres:5432/rustchat"
  
  # Redis
  RUSTCHAT_REDIS_URL: "redis://redis:6379"
  
  # S3/MinIO Credentials
  RUSTCHAT_S3_ACCESS_KEY: "change-me"
  RUSTCHAT_S3_SECRET_KEY: "change-me"
  
  # Admin User (optional)
  RUSTCHAT_ADMIN_USER: "admin@rustchat.local"
  RUSTCHAT_ADMIN_PASSWORD: "change-me"
